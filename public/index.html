<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nalaganje datotek</title>
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <script src="https://kit.fontawesome.com/32185b8427.js" crossorigin="anonymous"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap');
    </style>
</head>
<body>
    <div class="container">
        <h1>Spletna stran za datoteke</h1>
        <div class="upload-forms">
            <form id="uploadFormFile" action="/uploadFile" method="POST" enctype="multipart/form-data">
                <input type="file" name="datoteka" id="dataFile" multiple />
                <button type="submit">Naloži datoteko</button>
            </form>
        
            <form id="uploadFormFolder" action="/uploadFolder" method="POST" enctype="multipart/form-data">
                <input type="text" name="mapa" placeholder="Vnesite ime mape" required />
                <input type="file" name="datoteka" id="dataFolder" webkitdirectory multiple />
                <button type="submit">Naloži mapo</button>
            </form>
        </div>

        <iframe name="uploadFrame" style="display: none;"></iframe>
        <div id="message"></div>

        <div class="sort-container">
            <h1>Datoteke</h1>
            <label for="sortOrder">Razvrsti po:</label>
            <select id="sortOrder">
              <option value="abecedno">Abecedno</option>
              <option value="velikost">Velikost</option>
              <option value="datum">Datum</option>
            </select>
          </div>

        <ul id="file-list" class="file-list">
        </ul>
    </div>
    <script src="/js/upload.js"></script>
    <script src="/js/delete.js"></script>
    <script src="/js/sort.js"></script>
    <script src="/js/file-list.js"></script>

</body>
</html>
